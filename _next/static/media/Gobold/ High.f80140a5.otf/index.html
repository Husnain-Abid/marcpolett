/user-content%2Fsite_hBUM8WpQ6y%2FUntitled%20design%20(1).pdf?alt=media\u0026token=53c6b6a8-c088-48ee-ad2e-04d51d33ef39\",\"value\":\"https://firebasestorage.googleapis.com/v0/b/wild-ink-pages-prod.appspot.com/o/user-content%2Fsite_hBUM8WpQ6y%2FUntitled%20design%20(1).pdf?alt=media\u0026token=53c6b6a8-c088-48ee-ad2e-04d51d33ef39\"}}},\"linkStripe\":{\"url\":{\"data\":{\"expression\":\"https://www.marcpolett.com\",\"value\":\"https://www.marcpolett.com\"}}},\"linkWalmart\":{\"url\":{\"data\":{\"expression\":\"https://www.walmart.com/ip/Lily-s-Wondrous-World-A-Day-in-the-Park-Paperback/5234725738\",\"value\":\"https://www.walmart.com/ip/Lily-s-Wondrous-World-A-Day-in-the-Park-Paperback/5234725738\"}}},\"text\":{\"content\":{\"data\":{\"expression\":\"\u003cp\u003e\u003cem\u003eLily\u0026rsquo;s Wondrous World: A Day in the Park\u003c/em\u003e is a delightful tale that captures the joy and excitement of childhood friendships. Lily is a young girl who goes to the park and meets a rabbit named Benny, a squirrel named Nutty, and a dog named Rusty. Together they set off on an adventure playing games, enjoying nature, and building an incredible bond, reminding us of how fulfilling it is to make new friends and explore the great outdoors.\u003c/p\u003e\\n\u003cp\u003eThe story\u0026rsquo;s poetic narrative and colorful illustrations will have children wanting to read the book again and again. Ideal for 4- 8-year-olds, parents or educators will enjoy reading the book aloud while the children see the words come to life through the vivid illustrations.\u003c/p\u003e\\n\u003cp\u003e\u003cem\u003eLily\u0026rsquo;s Wondrous World: A Day in the Park\u003c/em\u003e will fill your child\u0026rsquo;s heart with joy, spark their imagination, and encourage them to spend time with loved ones reading books.\u0026nbsp;\u003c/p\u003e\",\"value\":\"\u003cp\u003e\u003cem\u003eLily\u0026rsquo;s Wondrous World: A Day in the Park\u003c/em\u003e is a delightful tale that captures the joy and exci ature and Childhood Joy with Author Marc Polett\u003c/a\u003e\u003cbr /\u003e\u003c/strong\u003eMosaic Digest, June 2024\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://www.storymonstersbookawards.com/purple-dragonfly-winners/purple-2024\\\"\u003e\u003cstrong\u003ePurple Dragonfly Award Honorable Mention in the Picture Books 5 and Younger Category\u003c/strong\u003e\u003c/a\u003e\u003cbr /\u003eStory Monsters Book Awards, July 2024\u0026nbsp;\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://readershouse.co.uk/marc-poletts-journey-through-lilys-wondrous-world/\\\"\u003e\u003cstrong\u003eMarc Polett\u0026rsquo;s Journey Through \u0026lsquo;Lily\u0026rsquo;s Wondrous World\u0026rsquo;\u003c/strong\u003e\u003c/a\u003e\u003cbr /\u003eReader\u0026rsquo;s House Magazine, May 2024\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://redheadedbooklover.com/lilys-wondrous-world-a-day-in-the-park-marc-polett/\\\"\u003e\u003cstrong\u003eLily\u0026rsquo;s Wondrous World: A Day in the Park, Marc Polett\u003c/strong\u003e\u003c/a\u003e\u003cbr /\u003eRed Headed Book Lover, April 2024\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://www.lmsd.org/about-lmsd/newsroom/article/~board/pves-information/post/author-brings-lilys-wondrous-world-to-penn-valley-students\\\"\u003e\u003cstrong\u003eAuthor Brings \\\"Lily's Wondrous World\\\" to Penn Valley Students\u003c/strong\u003e\u003c/a\u003e \u003cbr /\u003eLower Merion School District News, March 2024\u003c/p\u003e\",\"value\":\"\u003cp\u003e\u003cstrong\u003e\u003ca href=\\\"https://mosaicdigest.com/exploring-nature-and-childhood-joy-with-author-marc-polett/\\\"\u003eExploring Nature and Childhood Joy with Author Marc Polett\u003c/a\u003e\u003cbr /\u003e\u003c/strong\u003eMosaic Digest, June 2024\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://www.storymonstersbookawards.com/purple-dragonfly-winners/purple-2024\\\"\u003e\u003cstrong\u003ePurple Dragonfly Award Honorable Mention in the Picture Books 5 and Younger Category\u003c/strong\u003e\u003c/a\u003e\u003cbr /\u003eStory Monsters Book Awards, July 2024\u0026nbsp;\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://readershouse.co.uk/marc-poletts-journey-through-lilys-wondrous-world/\\\"\u003e\u003cstrong\u003eMarc Polett\u0026rsquo;s Journey Through \u0026lsquo;Lily\u0026rsquo;s Wondrous World\u0026rsquo;\u003c/strong\u003e\u003c/a\u003e\u003cbr /\u003eReader\u0026rsquo;s House Magazine, May 2024\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://redheadedbooklover.com/lilys-wondrous-world-a-day-in-the-park-marc-polett/\\\"\u003e\u003cstrong\u003eLily\u0026rsquo;s Wondrous World: A Day in the Park, Marc Polett\u003c/strong\u003e\u003c/a\u003e\u003cbr /\u003eRed Headed Book Lover, April 2024\u003c/p\u003e\\n\u003cp\u003e\u003ca href=\\\"https://www.lmsd.org/about-lmsd/newsroom/article/~board/pves-information/post/author-brings-lilys-wondrous-world-to-penn-valley-students\\\"\u003e\u003cstrong\u003eAuthor Brings \\\"Lily's Wondrous World\\\" to Penn Valley Students\u003c/strong\u003e\u003c/a\u003e \u003cbr /\u003eLower Merion School District News, March 2024\u003c/p\u003e\"}}},\"textReviews\":{\"content\":{\"data\":{\"expression\":\"\u003cp\u003e\u0026ldquo;In Polett\u0026rsquo;s rhyming picture book, a young girl explores the outdoors on a bright summer day and makes friends with a group of animals. This simple, idyllic picture book is a good option for storytimes for preschoolers and kindergartens, with its easy rhyme scheme and Baev\u0026rsquo;s bright, colorful illustrations depicting Lily and the animals playing. A precious tale with simple rhymes best suited for emerging readers.\u0026rdquo; \u0026mdash; Kirkus Review\u003c/p\u003e\\n\u003cp\u003e\\\"Memorable, heartfelt, and engaging.... a must-read children\u0026rsquo;s book that is not to be missed.\\\" \u003ca href=\\\"https://authoranthonyavinablog.com/2024/02/06/lilys-wondrous-world-a-day-in-the-park-by-marc-polett-review/\\\"\u003e\u0026mdash; Author Anthony Avina's Blog\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"Polett\u0026rsquo;s lyrical storytelling weaves a narrative that beckons readers to join Lily on her playful escapades\u0026mdash;he employs a rhythmic structure with a sing-song quality, creating a playful and musical cadence that engages young readers. The story unfolds through delightful rhythmic verses and vivid imagery, capturing the whimsy and innocence of childhood exploration. From dancing under the sun\u0026rsquo;s warm embrace to forging deep connections with Benny the rabbit, Nutty the squirrel, and Rusty the dog, Lily\u0026rsquo;s journey is a testament to the joy of discovery and the magic of friendship.\\\" \u003ca href=\\\"https://www.thechildrensbookreview.com/lilys-wondrous-world-a-day-in-the-park-dedicated-review/\\\"\u003e\u0026mdash; The Children's Book Review\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"Beautiful story and captivating illustrations.\\\" \u003ca href=\\\"https://comfychairbooks.com/2024/02/06/book-review-lilys-wondrous-world-a-day-in-the-park-by-marc-polett/\\\"\u003e\u0026mdash; Comfy Chair Books\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"The story\u0026rsquo;s seamless blend of visual artistry and lyrical storytelling makes it a delightful read for individuals of all ages. For those who cherish the companionship of animals, the allure of friendship, and the beauty of the great outdoors, this book is a heartwarming journey back to the essence of joy.\\\"\u0026nbsp; \u003ca href=\\\"https://literarytitan.com/tag/marc-polett/\\\"\u003e\u0026mdash; Literary Titan\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"...a delightful picture book about four friends and their time in the park. The visuals and character designs reflect the cheerful mood with its bold, bright, and Disney-esque designs.\\\" \u003ca href=\\\"https://chick-who-reads-everything.com/2024/02/05/lilys-wondrous-world-a-day-in-the-park-book-review/\\\"\u003e\u0026mdash; Chick Who Reads Everything\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"Vibrant pictures, adorable characters, and a whimsical, fun plot are just some of the ingredients for this charming children\u0026rsquo;s book. Children and adults will delight in reading it over and over again.\\\" \u003ca href=\\\"https://captivedreamswindow.wordpress.com/2024/01/08/lilys-wondrous-world-a-day-in-the-park-by-marc-polett-illustrated-by-vasya-baev/\\\"\u003e\u0026mdash; Captive Dreams Window\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\u0026ldquo;It was a really sweet and lovely book, I think a lot of young children are going to just adore reading and listening and looking at this book.\u0026rdquo; \u003ca href=\\\"https://apapergirlapapertown.wordpress.com/2024/01/14/lilys-wondrous-world-a-day-at-the-park-picture-book-review/\\\"\u003e\u0026mdash; apapergirlapapertown\u003c/a\u003e\u003c/p\u003e\",\"value\":\"\u003cp\u003e\u0026ldquo;In Polett\u0026rsquo;s rhyming picture book, a young girl explores the outdoors on a bright summer day and makes friends with a group of animals. This simple, idyllic picture book is a good option for storytimes for preschoolers and kindergartens, with its easy rhyme scheme and Baev\u0026rsquo;s bright, colorful illustrations depicting Lily and the animals playing. A precious tale with simple rhymes best suited for emerging readers.\u0026rdquo; \u0026mdash; Kirkus Review\u003c/p\u003e\\n\u003cp\u003e\\\"Memorable, heartfelt, and engaging.... a must-read children\u0026rsquo;s book that is not to be missed.\\\" \u003ca href=\\\"https://authoranthonyavinablog.com/2024/02/06/lilys-wondrous-world-a-day-in-the-park-by-marc-polett-review/\\\"\u003e\u0026mdash; Author Anthony Avina's Blog\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"Polett\u0026rsquo;s lyrical storytelling weaves a narrative that beckons readers to join Lily on her playful escapades\u0026mdash;he employs a rhythmic structure with a sing-song quality, creating a playful and musical cadence that engages young readers. The story unfolds through delightful rhythmic verses and vivid imagery, capturing the whimsy and innocence of childhood exploration. From dancing under the sun\u0026rsquo;s warm embrace to forging deep connections with Benny the rabbit, Nutty the squirrel, and Rusty the dog, Lily\u0026rsquo;s journey is a testament to the joy of discovery and the magic of friendship.\\\" \u003ca href=\\\"https://www.thechildrensbookreview.com/lilys-wondrous-world-a-day-in-the-park-dedicated-review/\\\"\u003e\u0026mdash; The Children's Book Review\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"Beautiful story and captivating illustrations.\\\" \u003ca href=\\\"https://comfychairbooks.com/2024/02/06/book-review-lilys-wondrous-world-a-day-in-the-park-by-marc-polett/\\\"\u003e\u0026mdash; Comfy Chair Books\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"The story\u0026rsquo;s seamless blend of visual artistry and lyrical storytelling makes it a delightful read for individuals of all ages. For those who cherish the companionship of animals, the allure of friendship, and the beauty of the great outdoors, this book is a heartwarming journey back to the essence of joy.\\\"\u0026nbsp; \u003ca href=\\\"https://literarytitan.com/tag/marc-polett/\\\"\u003e\u0026mdash; Literary Titan\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"...a delightful picture book about four friends and their time in the park. The visuals and character designs reflect the cheerful mood with its bold, bright, and Disney-esque designs.\\\" \u003ca href=\\\"https://chick-who-reads-everything.com/2024/02/05/lilys-wondrous-world-a-day-in-the-park-book-review/\\\"\u003e\u0026mdash; Chick Who Reads Everything\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\\\"Vibrant pictures, adorable characters, and a whimsical, fun plot are just some of the ingredients for this charming children\u0026rsquo;s book. Children and adults will delight in reading it over and over again.\\\" \u003ca href=\\\"https://captivedreamswindow.wordpress.com/2024/01/08/lilys-wondrous-world-a-day-in-the-park-by-marc-polett-illustrated-by-vasya-baev/\\\"\u003e\u0026mdash; Captive Dreams Window\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e\u0026ldquo;It was a really sweet and lovely book, I think a lot of young children are going to just adore reading and listening and looking at this book.\u0026rdquo; \u003ca href=\\\"https://apapergirlapapertown.wordpress.com/2024/01/14/lilys-wondrous-world-a-day-at-the-park-picture-book-review/\\\"\u003e\u0026mdash; apapergirlapapertown\u003c/a\u003e\u003c/p\u003e\"}}}}}},\"thankYou\":{\"components\":{\"ids\":[\"listProducts\"],\"items\":{\"listProducts\":{\"filter\":{\"data\":{\"expression\":\"{{current_item.id == current_page.request.query.product}}\",\"value\":\"{{current_item.id == current_page.request.query.product}}\"}}}}}}}}}}}}},\"social\":{},\"customHtml\":{\"pages\":{}},\"onboard\":{},\"navigation\":{}},\"ignoreClientIp\":true}","notFound":false},"page":"/_error","query":{},"buildId":"P0obrz7cnjfyUjp0cWZE2","isFallback":false,"gip":true,"appGip":true,"scriptLoader":[]}</script></body></html>
